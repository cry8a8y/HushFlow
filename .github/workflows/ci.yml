name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-unix:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        if: runner.os == 'Linux'
        run: sudo apt-get install -y jq

      - name: Run smoke tests
        run: bash test/smoke-test.sh

      - name: Run unit tests
        run: bash test/unit-test.sh

      - name: Run installer contract tests
        run: bash test/install-contract-test.sh

      - name: Run E2E install tests
        run: bash test/e2e-install-test.sh

      - name: Syntax check all scripts
        run: |
          for f in breathe-compact.sh hooks/*.sh set-exercise.sh install.sh cli.sh doctor.sh lib/*.sh plugins/*.sh; do
            [ -f "$f" ] && { bash -n "$f" || exit 1; }
          done
          echo "All scripts pass syntax check"

      - name: Validate community themes
        run: |
          if command -v jq &>/dev/null; then
            for f in themes/*.json; do
              jq empty "$f" || { echo "FAIL: invalid JSON in $f"; exit 1; }
              jq -e '.name and .colors.primary and .colors.secondary' "$f" > /dev/null || {
                echo "FAIL: $f missing required fields (name, colors.primary, colors.secondary)"
                exit 1
              }
            done
            echo "All themes valid"
          else
            echo "SKIP: jq not available"
          fi

      - name: Install tmux
        if: runner.os == 'Linux'
        run: sudo apt-get install -y tmux

      - name: UI layout tests (tmux + inline)
        if: runner.os == 'Linux'
        run: bash scripts/test-ui-layout.sh --ci

  test-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run PowerShell installer tests
        run: pwsh test/install-ps1-test.ps1

      - name: Syntax check install.ps1
        run: |
          $null = [System.Management.Automation.PSParser]::Tokenize(
            (Get-Content install.ps1 -Raw), [ref]$null
          )
          Write-Host "install.ps1 syntax OK"
